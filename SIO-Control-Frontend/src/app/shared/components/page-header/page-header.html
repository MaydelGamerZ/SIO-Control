<header class="d-flex flex-column gap-3 gap-lg-4 flex-lg-row justify-content-lg-between align-items-lg-start mb-4">
  <div class="min-w-0">
    @if (eyebrow()) {
      <div class="text-uppercase small fw-semibold text-primary">{{ eyebrow() }}</div>
    }
    <h1 class="display-6 fw-bold mt-2 mb-2">{{ title() }}</h1>
    @if (description()) {
      <p class="mb-0 text-secondary" style="max-width: 56rem;">{{ description() }}</p>
    } @else {
      <ng-content></ng-content>
    }
  </div>
  <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
    <ng-content select="[actions]"></ng-content>
  </div>
</header>
