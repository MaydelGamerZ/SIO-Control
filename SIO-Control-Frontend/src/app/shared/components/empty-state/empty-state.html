<section class="rounded-4 border bg-white p-5 text-center shadow-sm">
  <div class="mx-auto mb-3 d-inline-flex align-items-center justify-content-center rounded-circle bg-primary-subtle text-primary-emphasis" style="width: 3.5rem; height: 3.5rem;">
    <i class="bi fs-4" [ngClass]="icon()"></i>
  </div>
  <h3 class="h5 fw-bold">{{ title() }}</h3>
  <p class="mb-0 mx-auto text-secondary" style="max-width: 34rem;">{{ description() }}</p>
  <div class="mt-4">
    <ng-content select="[action]"></ng-content>
  </div>
</section>
