<article class="card border-0 shadow-sm h-100">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3">
      <div>
        <div class="text-uppercase small fw-semibold text-secondary">{{ label() }}</div>
        <div class="display-6 fw-bold mt-2">{{ value() }}</div>
      </div>
      <div class="rounded-circle d-inline-flex align-items-center justify-content-center bg-light text-dark" style="width: 3rem; height: 3rem;">
        <i class="bi fs-5" [ngClass]="icon()"></i>
      </div>
    </div>
    <div class="mt-3">
      <span class="badge rounded-pill" [ngClass]="'text-bg-' + tone()">{{ tone() | titlecase }}</span>
    </div>
  </div>
</article>
