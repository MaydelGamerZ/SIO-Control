<main class="login-wrapper min-vh-100 d-flex align-items-center py-4">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-6">
        <div class="card border-0 shadow-lg overflow-hidden">
          <div class="row g-0">
            <div class="col-12 col-lg-5 login-panel p-4 p-lg-5 text-white">
              <div class="small text-uppercase fw-semibold opacity-75">SIO Control</div>
              <h1 class="display-6 fw-bold mt-3">Inventario operativo en tiempo real</h1>
              <p class="mt-3 mb-0 opacity-75">
                Accede para cargar PDF, ejecutar conteos, comparar usuarios y administrar permisos desde Angular.
              </p>
            </div>

            <div class="col-12 col-lg-7 p-4 p-lg-5 bg-white">
              <div class="small text-uppercase fw-semibold text-primary">Acceso</div>
              <h2 class="h3 fw-bold mt-2">Entrar al sistema</h2>

              <app-error-state [message]="error() || auth.profileError()"></app-error-state>

              <form class="mt-4" [formGroup]="form" (ngSubmit)="submit('login')">
                <div class="mb-3">
                  <label class="form-label fw-semibold" for="login-email">Correo</label>
                  <input class="form-control form-control-lg" formControlName="email" id="login-email" placeholder="correo@empresa.com" type="email" />
                </div>
                <div class="mb-4">
                  <label class="form-label fw-semibold" for="login-password">Contrasena</label>
                  <input class="form-control form-control-lg" formControlName="password" id="login-password" placeholder="Minimo 6 caracteres" type="password" />
                </div>

                <div class="d-grid gap-2 d-md-flex">
                  <button class="btn btn-primary btn-lg flex-fill" [disabled]="loading()" type="submit">
                    @if (loading()) {
                      <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    Iniciar sesion
                  </button>
                  <button class="btn btn-outline-secondary btn-lg flex-fill" [disabled]="loading()" type="button" (click)="submit('register')">
                    Crear cuenta
                  </button>
                </div>
              </form>

              <div class="text-center text-secondary small fw-semibold my-4">o</div>

              <button class="btn btn-light border btn-lg w-100" [disabled]="loading()" type="button" (click)="loginWithGoogle()">
                <i class="bi bi-google me-2"></i>
                Continuar con Google
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
