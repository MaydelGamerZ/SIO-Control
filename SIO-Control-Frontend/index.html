<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08111f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SIO-Control" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>SIO-Control</title>
    <script>
      if (!Array.prototype.at) {
        Array.prototype.at = function(index) {
          var length = this.length >>> 0;
          var numericIndex = Number(index) || 0;
          var position = numericIndex < 0 ? Math.ceil(numericIndex) : Math.floor(numericIndex);
          if (position < 0) position += length;
          if (position < 0 || position >= length) return undefined;
          return this[position];
        };
      }
      if (!Promise.withResolvers) {
        Promise.withResolvers = function() {
          var resolve;
          var reject;
          var promise = new Promise(function(res, rej) {
            resolve = res;
            reject = rej;
          });
          return { promise: promise, resolve: resolve, reject: reject };
        };
      }
      if (window.File && window.File.prototype && !window.File.prototype.arrayBuffer) {
        window.File.prototype.arrayBuffer = function() {
          var file = this;
          return new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onerror = function() { reject(reader.error); };
            reader.onload = function() { resolve(reader.result); };
            reader.readAsArrayBuffer(file);
          });
        };
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
